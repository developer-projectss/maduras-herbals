<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maduras Herbals — Login</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        display: flex;
        min-height: 100vh;
        overflow: hidden;
      }

      /* ── Left Panel ── */
      .left-panel {
        width: 42%;
        background: linear-gradient(160deg, #1a4a00 0%, #2d7a00 55%, #3d9400 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 36px;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }

      .left-panel::before {
        content: '';
        position: absolute;
        width: 340px; height: 340px;
        border-radius: 50%;
        background: rgba(255,255,255,0.05);
        top: -100px; left: -100px;
      }

      .left-panel::after {
        content: '';
        position: absolute;
        width: 260px; height: 260px;
        border-radius: 50%;
        background: rgba(255,255,255,0.05);
        bottom: -70px; right: -70px;
      }

      .brand-logo {
        width: 150px;
        margin-bottom: 22px;
        position: relative;
        z-index: 1;
        mix-blend-mode: screen;
        opacity: 0.92;
      }

      .brand-name {
        font-size: 24px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 2.5px;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .brand-tagline {
        font-size: 13px;
        color: rgba(255,255,255,0.72);
        font-style: italic;
        margin-top: 8px;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .brand-divider {
        width: 44px;
        height: 3px;
        background: rgba(255,255,255,0.3);
        border-radius: 2px;
        margin: 22px auto;
        position: relative;
        z-index: 1;
      }

      .brand-desc {
        font-size: 13px;
        color: rgba(255,255,255,0.58);
        text-align: center;
        line-height: 1.65;
        max-width: 230px;
        position: relative;
        z-index: 1;
      }

      /* ── Right Panel ── */
      .right-panel {
        flex: 1;
        background: #f6f8f6;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 32px;
        overflow-y: auto;
      }

      .login-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 32px rgba(0,0,0,0.08);
        padding: 44px 40px;
        width: 100%;
        max-width: 380px;
      }

      .login-title {
        font-size: 22px;
        font-weight: 700;
        color: #1a2a1a;
        margin-bottom: 5px;
      }

      .login-subtitle {
        font-size: 13px;
        color: #7a8a7a;
        margin-bottom: 32px;
      }

      .field { margin-bottom: 18px; }

      label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #3a4a3a;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        margin-bottom: 7px;
      }

      input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid #dde5dd;
        border-radius: 8px;
        font-size: 14px;
        color: #1a2a1a;
        background: #fafcfa;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      input:focus {
        border-color: #3d9400;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(61,148,0,0.10);
      }

      .btn-login {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #2d7a00, #4aaa00);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: opacity 0.2s, transform 0.1s;
        letter-spacing: 0.3px;
      }

      .btn-login:hover:not(:disabled) { opacity: 0.91; transform: translateY(-1px); }
      .btn-login:active:not(:disabled) { transform: translateY(0); }
      .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

      .spinner {
        width: 15px; height: 15px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .error-msg {
        display: none;
        margin-top: 14px;
        padding: 10px 14px;
        background: #fff5f5;
        color: #c0392b;
        border: 1px solid #f5c6c2;
        border-radius: 8px;
        font-size: 13px;
      }

      .error-msg.visible { display: block; }

      .footer-text {
        margin-top: 28px;
        font-size: 11px;
        color: #b0bab0;
        text-align: center;
      }

      /* ── Mobile Responsive ── */
      @media (max-width: 768px) {
        body {
          flex-direction: column;
          overflow: auto;
        }

        .left-panel {
          width: 100%;
          padding: 32px 24px;
          flex-direction: row;
          justify-content: center;
          gap: 16px;
          min-height: auto;
        }

        .left-panel::before,
        .left-panel::after { display: none; }

        .brand-logo {
          width: 56px;
          margin-bottom: 0;
        }

        .brand-name { font-size: 18px; letter-spacing: 1.5px; }
        .brand-tagline { font-size: 12px; margin-top: 4px; }
        .brand-divider, .brand-desc { display: none; }

        .brand-text { text-align: left; }

        .right-panel {
          flex: none;
          padding: 28px 20px;
          align-items: flex-start;
        }

        .login-card {
          padding: 32px 24px;
          box-shadow: none;
          border-radius: 12px;
        }
      }

      @media (max-width: 400px) {
        .login-card { padding: 24px 18px; }
        .login-title { font-size: 20px; }
      }
    </style>
  </head>
  <body>

    <div class="left-panel">
      <img src="./js/templates/logo.png" alt="Maduras Herbals" class="brand-logo" />
      <div class="brand-text">
        <div class="brand-name">MADURAS HERBALS</div>
        <div class="brand-tagline">Connecting Nature to You</div>
        <div class="brand-divider"></div>
        <div class="brand-desc">PDF Document Generator for Certificates of Analysis &amp; Safety Data Sheets</div>
      </div>
    </div>

    <div class="right-panel">
      <div class="login-card">
        <div class="login-title">Welcome back</div>
        <div class="login-subtitle">Sign in to access your workspace</div>

        <form id="loginForm">
          <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" placeholder="Enter your username" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" placeholder="Enter your password" required />
          </div>
          <button class="btn-login" type="submit" id="loginBtn">Sign In</button>
          <div class="error-msg" id="errorMsg"></div>
        </form>

        <p class="footer-text">Maduras Herbals Pvt Ltd &nbsp;·&nbsp; Secure Access</p>
      </div>
    </div>

    <script type="module">
      import { saveSession, getToken } from './js/auth.js';

      if (getToken()) window.location.href = './app.html';

      const form     = document.getElementById('loginForm');
      const btn      = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.classList.remove('visible');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        btn.disabled  = true;
        btn.innerHTML = '<span class="spinner"></span>Signing in…';

        try {
          const res  = await fetch('/api/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ username, password }),
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || 'Login failed');

          saveSession(data.token, data.name);
          window.location.href = './app.html';

        } catch (err) {
          errorMsg.textContent = err.message;
          errorMsg.classList.add('visible');
          btn.disabled  = false;
          btn.innerHTML = 'Sign In';
        }
      });
    </script>
  </body>
</html>
