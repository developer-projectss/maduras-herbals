<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maduras Herbals — Login</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        display: flex;
        height: 100vh;
      }

      /* ── Left Panel ── */
      .left-panel {
        width: 42%;
        background: linear-gradient(160deg, #1a4a00 0%, #2d7a00 50%, #3d9400 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 40px;
        position: relative;
        overflow: hidden;
      }

      .left-panel::before {
        content: '';
        position: absolute;
        width: 320px; height: 320px;
        border-radius: 50%;
        background: rgba(255,255,255,0.04);
        top: -80px; left: -80px;
      }

      .left-panel::after {
        content: '';
        position: absolute;
        width: 240px; height: 240px;
        border-radius: 50%;
        background: rgba(255,255,255,0.04);
        bottom: -60px; right: -60px;
      }

      .brand-logo {
        width: 140px;
        margin-bottom: 24px;
        filter: brightness(0) invert(1);
        position: relative;
        z-index: 1;
      }

      .brand-name {
        font-size: 26px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 2px;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .brand-tagline {
        font-size: 13px;
        color: rgba(255,255,255,0.75);
        font-style: italic;
        margin-top: 8px;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .brand-divider {
        width: 48px;
        height: 3px;
        background: rgba(255,255,255,0.35);
        border-radius: 2px;
        margin: 24px auto;
        position: relative;
        z-index: 1;
      }

      .brand-desc {
        font-size: 13px;
        color: rgba(255,255,255,0.6);
        text-align: center;
        line-height: 1.6;
        max-width: 240px;
        position: relative;
        z-index: 1;
      }

      /* ── Right Panel ── */
      .right-panel {
        flex: 1;
        background: #f7f8f7;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }

      .login-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 32px rgba(0,0,0,0.08);
        padding: 44px 40px;
        width: 100%;
        max-width: 380px;
      }

      .login-title {
        font-size: 22px;
        font-weight: 700;
        color: #1a2a1a;
        margin-bottom: 6px;
      }

      .login-subtitle {
        font-size: 13px;
        color: #7a8a7a;
        margin-bottom: 32px;
      }

      .field {
        margin-bottom: 18px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #3a4a3a;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 7px;
      }

      input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid #dde5dd;
        border-radius: 8px;
        font-size: 14px;
        color: #1a2a1a;
        background: #fafcfa;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      input:focus {
        border-color: #3d9400;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(61,148,0,0.10);
      }

      .btn-login {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #2d7a00, #4aaa00);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: opacity 0.2s, transform 0.1s;
        letter-spacing: 0.3px;
      }

      .btn-login:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
      .btn-login:active:not(:disabled) { transform: translateY(0); }
      .btn-login:disabled { opacity: 0.55; cursor: not-allowed; }

      .spinner {
        width: 15px; height: 15px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .error-msg {
        display: none;
        margin-top: 14px;
        padding: 10px 14px;
        background: #fff5f5;
        color: #c0392b;
        border: 1px solid #f5c6c2;
        border-radius: 8px;
        font-size: 13px;
      }

      .error-msg.visible { display: block; }

      .footer-text {
        margin-top: 28px;
        font-size: 11px;
        color: #b0bab0;
        text-align: center;
      }
    </style>
  </head>
  <body>

    <!-- Left branding panel -->
    <div class="left-panel">
      <img src="./js/templates/logo.png" alt="Maduras Herbals" class="brand-logo" />
      <div class="brand-name">MADURAS HERBALS</div>
      <div class="brand-tagline">Connecting Nature to You</div>
      <div class="brand-divider"></div>
      <div class="brand-desc">PDF Document Generator for Certificates of Analysis &amp; Safety Data Sheets</div>
    </div>

    <!-- Right login panel -->
    <div class="right-panel">
      <div class="login-card">
        <div class="login-title">Welcome back</div>
        <div class="login-subtitle">Sign in to access your workspace</div>

        <form id="loginForm">
          <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" placeholder="Enter your username" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" placeholder="Enter your password" required />
          </div>
          <button class="btn-login" type="submit" id="loginBtn">Sign In</button>
          <div class="error-msg" id="errorMsg"></div>
        </form>

        <p class="footer-text">Maduras Herbals Pvt Ltd &nbsp;·&nbsp; Secure Access</p>
      </div>
    </div>

    <script type="module">
      import { saveSession, getToken } from './js/auth.js';

      if (getToken()) window.location.href = './app.html';

      const form     = document.getElementById('loginForm');
      const btn      = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.classList.remove('visible');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        btn.disabled  = true;
        btn.innerHTML = '<span class="spinner"></span>Signing in…';

        try {
          const res  = await fetch('/api/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ username, password }),
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || 'Login failed');

          saveSession(data.token, data.name);
          window.location.href = './app.html';

        } catch (err) {
          errorMsg.textContent = err.message;
          errorMsg.classList.add('visible');
          btn.disabled  = false;
          btn.innerHTML = 'Sign In';
        }
      });
    </script>
  </body>
</html>
