<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maduras Herbals — Login</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f0f4f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card {
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 4px 28px rgba(0,0,0,0.10);
        padding: 40px 36px 36px;
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      .logo {
        width: 130px;
        margin: 0 auto 16px;
        display: block;
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a1a;
        letter-spacing: 0.5px;
      }

      .tagline {
        font-size: 13px;
        color: #5ea500;
        font-style: italic;
        margin-top: 4px;
        margin-bottom: 28px;
      }

      .divider {
        border: none;
        border-top: 1px solid #e8f0e8;
        margin-bottom: 24px;
      }

      .field {
        text-align: left;
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #344054;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid #d0d5dd;
        border-radius: 8px;
        font-size: 14px;
        color: #1a1a1a;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: #5ea500;
        box-shadow: 0 0 0 3px rgba(94,165,0,0.12);
      }

      .btn-login {
        width: 100%;
        padding: 11px;
        background: #5ea500;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.2s;
      }

      .btn-login:hover:not(:disabled) { background: #4d8a00; }
      .btn-login:disabled { background: #a8d060; cursor: not-allowed; }

      .spinner {
        width: 15px; height: 15px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .error-msg {
        display: none;
        margin-top: 14px;
        padding: 10px 14px;
        background: #fef3f2;
        color: #b42318;
        border: 1px solid #fecdca;
        border-radius: 8px;
        font-size: 13px;
        text-align: left;
      }

      .error-msg.visible { display: block; }

      .footer-text {
        margin-top: 20px;
        font-size: 11px;
        color: #98a2b3;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="./js/templates/logo.png" alt="Maduras Herbals" class="logo" />
      <h1>MADURAS HERBALS</h1>
      <p class="tagline">Connecting Nature to You</p>
      <hr class="divider" />

      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" autocomplete="username" placeholder="Enter username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="Enter password" required />
        </div>
        <button class="btn-login" type="submit" id="loginBtn">Sign In</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <p class="footer-text">PDF Document Generator &nbsp;·&nbsp; Maduras Herbals Pvt Ltd</p>
    </div>

    <script type="module">
      import { saveSession, getToken } from './js/auth.js';

      if (getToken()) window.location.href = './app.html';

      const form     = document.getElementById('loginForm');
      const btn      = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.classList.remove('visible');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        btn.disabled  = true;
        btn.innerHTML = '<span class="spinner"></span>Signing in…';

        try {
          const res  = await fetch('/api/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ username, password }),
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || 'Login failed');

          saveSession(data.token, data.name);
          window.location.href = './app.html';

        } catch (err) {
          errorMsg.textContent = err.message;
          errorMsg.classList.add('visible');
          btn.disabled  = false;
          btn.innerHTML = 'Sign In';
        }
      });
    </script>
  </body>
</html>
